<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【主机】近战与3C操控反馈跟进汇总</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<!-- Firebase SDK (compat 版本，直接在 HTML 中使用) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;}
/* ---- Header ---- */
.header{background:linear-gradient(135deg,#1a1f2e,#0d1117);padding:24px 40px 16px;border-bottom:2px solid #21262d;}
.header h1{font-size:24px;color:#58a6ff;margin-bottom:6px;}
.header p{color:#8b949e;font-size:13px;}
/* ---- Global Progress ---- */
.global-progress{background:#161b22;padding:16px 40px;border-bottom:1px solid #21262d;}
.gp-row{display:flex;align-items:center;gap:14px;}
.gp-label{color:#e6edf3;font-size:14px;font-weight:bold;white-space:nowrap;}
.gp-bar-wrap{flex:1;background:#21262d;border-radius:10px;height:14px;overflow:hidden;}
.gp-bar{height:100%;background:linear-gradient(90deg,#238636,#3fb950);border-radius:10px;transition:width .4s;}
.gp-pct{color:#3fb950;font-size:14px;font-weight:bold;white-space:nowrap;min-width:45px;}
.gp-detail{color:#8b949e;font-size:12px;white-space:nowrap;}
/* ---- Stats ---- */
.stats{display:flex;gap:14px;padding:16px 40px;flex-wrap:wrap;}
.stat-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px 20px;min-width:130px;text-align:center;}
.stat-card .num{font-size:26px;font-weight:bold;}
.stat-card .label{font-size:11px;color:#8b949e;margin-top:3px;}
.red{color:#f85149;} .blue{color:#58a6ff;} .green{color:#3fb950;} .orange{color:#e3b341;}
/* ---- Filter Bar ---- */
.filter-bar{display:flex;gap:8px;padding:12px 40px;flex-wrap:wrap;align-items:center;background:#161b22;border-bottom:1px solid #21262d;}
.filter-bar span{color:#8b949e;font-size:12px;}
.btn{padding:5px 13px;border-radius:20px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:12px;transition:all .2s;}
.btn:hover,.btn.active{background:#58a6ff;border-color:#58a6ff;color:#fff;}
.btn-export{background:#238636;border-color:#238636;color:#fff;margin-left:auto;}
.btn-export:hover{background:#2ea043;}
/* ---- Category Block ---- */
.main{padding:20px 40px;}
.category-block{margin-bottom:24px;border:1px solid #21262d;border-radius:10px;overflow:hidden;}
.cat-header{display:flex;align-items:center;gap:10px;padding:12px 18px;background:#161b22;cursor:pointer;user-select:none;}
.cat-header:hover{background:#1c2128;}
.cat-title{font-size:14px;font-weight:bold;color:#e6edf3;flex:1;}
.cat-count{background:#21262d;color:#8b949e;padding:2px 9px;border-radius:10px;font-size:11px;}
.priority-badge{padding:2px 7px;border-radius:4px;font-size:11px;background:#3d0a0a;color:#f85149;font-weight:bold;}
.module-tag{padding:2px 7px;border-radius:4px;font-size:11px;background:#21262d;color:#8b949e;}
.arrow{color:#8b949e;font-size:11px;transition:transform .3s;}
.arrow.open{transform:rotate(90deg);}
/* ---- Cat Progress ---- */
.cat-progress{padding:8px 18px 4px;background:#161b22;border-top:1px solid #21262d;}
.cp-row{display:flex;align-items:center;gap:10px;}
.cp-label{font-size:12px;color:#8b949e;}
.cp-bar-wrap{flex:1;background:#21262d;border-radius:6px;height:8px;overflow:hidden;}
.cp-bar{height:100%;background:linear-gradient(90deg,#1f6feb,#58a6ff);border-radius:6px;transition:width .4s;}
.cp-pct{font-size:12px;font-weight:bold;min-width:38px;}
/* ---- Solution Table ---- */
.cat-body{display:none;}
.cat-body.open{display:block;}
.solution-section{padding:12px 18px 8px;}
.sol-title{color:#58a6ff;font-size:12px;font-weight:bold;margin-bottom:8px;}
.sol-table{width:100%;border-collapse:collapse;font-size:12px;}
.sol-table th{background:#1c2128;color:#8b949e;padding:7px 8px;text-align:left;border:1px solid #21262d;white-space:nowrap;font-weight:normal;}
.sol-table td{border:1px solid #21262d;padding:5px 7px;vertical-align:middle;}
.sol-table tr:hover td{background:#1c2128;}
.sol-text{color:#c9d1d9;line-height:1.5;min-width:180px;}
td input[type=text],td input[type=date]{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:3px 6px;border-radius:4px;font-size:12px;width:100%;outline:none;}
td input[type=text]:focus,td input[type=date]:focus{border-color:#58a6ff;}
td input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#3fb950;}
.done-row td{opacity:.55;}
.done-row .sol-text{text-decoration:line-through;color:#8b949e;}
/* ---- Feedback Items ---- */
.items-section{padding:0 18px 14px;}
.items-toggle{color:#8b949e;font-size:12px;cursor:pointer;padding:6px 0;display:inline-block;}
.items-toggle:hover{color:#58a6ff;}
.items-list{display:none;margin-top:6px;}
.items-list.open{display:block;}
.item{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:10px 14px;margin-bottom:6px;}
.item-top{display:flex;gap:7px;align-items:center;margin-bottom:5px;}
.item-id{background:#21262d;color:#8b949e;padding:1px 6px;border-radius:3px;font-size:11px;font-family:monospace;}
.tag-bug{background:#3d0a0a;color:#f85149;padding:1px 6px;border-radius:3px;font-size:11px;}
.tag-suggest{background:#0d2136;color:#58a6ff;padding:1px 6px;border-radius:3px;font-size:11px;}
.tag-exp{background:#1c1c0a;color:#e3b341;padding:1px 6px;border-radius:3px;font-size:11px;}
.conf-high{background:#0d2b0d;color:#3fb950;padding:1px 6px;border-radius:3px;font-size:11px;}
.conf-mid{background:#1c1c0a;color:#e3b341;padding:1px 6px;border-radius:3px;font-size:11px;}
.conf-low{background:#1c1408;color:#d29922;padding:1px 6px;border-radius:3px;font-size:11px;}
.item-zh{color:#e6edf3;font-size:12px;line-height:1.5;margin-bottom:3px;}
.item-en{color:#8b949e;font-size:11px;font-style:italic;}
.module-near .cat-header{border-left:3px solid #f85149;}
.module-3c .cat-header{border-left:3px solid #58a6ff;}
.module-near{border-color:#f85149;}
.module-3c{border-color:#58a6ff;}
/* ---- Lock Bar ---- */
.lock-bar{display:flex;align-items:center;gap:10px;padding:9px 40px;background:#161b22;border-bottom:2px solid #f85149;flex-wrap:wrap;}
.lock-bar.unlocked{border-bottom-color:#238636;background:#0d1f14;}
.lock-status{font-size:13px;font-weight:bold;color:#f85149;flex:1;}
.lock-bar.unlocked .lock-status{color:#3fb950;}
.lock-bar input[type=password]{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:5px 10px;border-radius:6px;font-size:13px;width:180px;outline:none;}
.lock-bar input[type=password]:focus{border-color:#58a6ff;}
.lock-btn{padding:5px 16px;border-radius:6px;border:none;background:#d29922;color:#000;font-size:13px;font-weight:bold;cursor:pointer;}
.lock-btn:hover{background:#e3b341;}
.lock-err{color:#f85149;font-size:12px;}
/* ---- Type Progress Panel ---- */
.type-progress-panel{background:#0d1117;padding:10px 40px 16px;border-bottom:1px solid #21262d;display:flex;align-items:flex-start;gap:0;}
.tp-section{flex:1;}
.tp-section-title{font-size:11px;color:#8b949e;font-weight:bold;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase;}
.tp-cards{display:flex;gap:10px;flex-wrap:wrap;}
.tp-card{flex:1;min-width:140px;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px 14px;}
.tp-card-head{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.tp-icon{font-size:14px;}
.tp-name{flex:1;font-size:12px;color:#c9d1d9;font-weight:bold;}
.tp-pct{font-size:16px;font-weight:bold;min-width:42px;text-align:right;}
.tp-bar-wrap{background:#21262d;border-radius:6px;height:7px;overflow:hidden;margin-bottom:5px;}
.tp-bar{height:100%;border-radius:6px;transition:width .5s ease;}
.tp-detail{font-size:11px;color:#8b949e;}
/* 近战 - 红 */
.tp-near{border-color:#30101a;}
.tp-bar-near{background:linear-gradient(90deg,#a01010,#f85149);}
.tp-near .tp-pct{color:#f85149;}
/* 3C - 蓝 */
.tp-3c{border-color:#0d1f36;}
.tp-bar-3c{background:linear-gradient(90deg,#1a4a8a,#58a6ff);}
.tp-3c .tp-pct{color:#58a6ff;}
/* Bug - 橙红 */
.tp-bug{border-color:#2b1010;}
.tp-bar-bug{background:linear-gradient(90deg,#8a2020,#ff6b6b);}
.tp-bug .tp-pct{color:#ff6b6b;}
/* 建议 - 蓝绿 */
.tp-sug{border-color:#0a2030;}
.tp-bar-sug{background:linear-gradient(90deg,#1a6a8a,#56c2e6);}
.tp-sug .tp-pct{color:#56c2e6;}
/* 体验 - 金黄 */
.tp-exp{border-color:#2a2000;}
.tp-bar-exp{background:linear-gradient(90deg,#8a6a00,#e3b341);}
.tp-exp .tp-pct{color:#e3b341;}
/* 面板分割线 */
.tp-divider{width:1px;background:#21262d;margin:0 20px;align-self:stretch;}
</style>
</head>
<body>
<div class="header">
  <h1>🎮 【主机】近战与3C操控反馈跟进汇总</h1>
  <p>玩家反馈分析报告 · 跟进人：刘彬、刘荣钊 · 共 120 条反馈</p>
</div>

<!-- 🔐 权限控制栏 -->
<div class="lock-bar" id="lock-bar">
  <span class="lock-status" id="lock-status">🔒 只读模式 · 仅查看数据，编辑需要输入密码</span>
  <input type="password" id="pwd-input" placeholder="输入编辑密码..." onkeydown="if(event.key==='Enter')unlockEdit()">
  <button class="lock-btn" id="lock-btn" onclick="unlockEdit()">🔓 解锁编辑</button>
  <span class="lock-err" id="lock-err"></span>
</div>

<!-- ① 整体专项完成进度 -->
<div class="global-progress">
  <div class="gp-row">
    <span class="gp-label">📊 专项整体完成进度</span>
    <div class="gp-bar-wrap"><div class="gp-bar" id="gp-bar" style="width:0%"></div></div>
    <span class="gp-pct" id="gp-pct">0%</span>
    <span class="gp-detail" id="gp-detail">0 / 0 项优化完成</span>
  </div>
</div>

<!-- ② 多维度进度统计面板 -->
<div class="type-progress-panel">
  <div class="tp-section">
    <div class="tp-section-title">📦 按模块</div>
    <div class="tp-cards">
      <div class="tp-card tp-near">
        <div class="tp-card-head">
          <span class="tp-icon">⚔️</span>
          <span class="tp-name">近战模块</span>
          <span class="tp-pct" id="tp-pct-near">0%</span>
        </div>
        <div class="tp-bar-wrap"><div class="tp-bar tp-bar-near" id="tp-bar-near" style="width:0%"></div></div>
        <div class="tp-detail" id="tp-det-near">0 / 0 项</div>
      </div>
      <div class="tp-card tp-3c">
        <div class="tp-card-head">
          <span class="tp-icon">🎮</span>
          <span class="tp-name">3C控制模块</span>
          <span class="tp-pct" id="tp-pct-3c">0%</span>
        </div>
        <div class="tp-bar-wrap"><div class="tp-bar tp-bar-3c" id="tp-bar-3c" style="width:0%"></div></div>
        <div class="tp-detail" id="tp-det-3c">0 / 0 项</div>
      </div>
    </div>
  </div>
  <div class="tp-divider"></div>
  <div class="tp-section">
    <div class="tp-section-title">🏷️ 按反馈类型</div>
    <div class="tp-cards">
      <div class="tp-card tp-bug">
        <div class="tp-card-head">
          <span class="tp-icon">🐛</span>
          <span class="tp-name">Bug 类</span>
          <span class="tp-pct" id="tp-pct-bug">0%</span>
        </div>
        <div class="tp-bar-wrap"><div class="tp-bar tp-bar-bug" id="tp-bar-bug" style="width:0%"></div></div>
        <div class="tp-detail" id="tp-det-bug">0 / 0 项</div>
      </div>
      <div class="tp-card tp-sug">
        <div class="tp-card-head">
          <span class="tp-icon">💡</span>
          <span class="tp-name">建议类</span>
          <span class="tp-pct" id="tp-pct-suggest">0%</span>
        </div>
        <div class="tp-bar-wrap"><div class="tp-bar tp-bar-sug" id="tp-bar-suggest" style="width:0%"></div></div>
        <div class="tp-detail" id="tp-det-suggest">0 / 0 项</div>
      </div>
      <div class="tp-card tp-exp">
        <div class="tp-card-head">
          <span class="tp-icon">⚡</span>
          <span class="tp-name">体验类</span>
          <span class="tp-pct" id="tp-pct-exp">0%</span>
        </div>
        <div class="tp-bar-wrap"><div class="tp-bar tp-bar-exp" id="tp-bar-exp" style="width:0%"></div></div>
        <div class="tp-detail" id="tp-det-exp">0 / 0 项</div>
      </div>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="num red">120</div><div class="label">总反馈条数</div></div>
  <div class="stat-card"><div class="num red">68</div><div class="label">Bug 类</div></div>
  <div class="stat-card"><div class="num blue">41</div><div class="label">建议类</div></div>
  <div class="stat-card"><div class="num orange">11</div><div class="label">体验类</div></div>
  <div class="stat-card"><div class="num green">13</div><div class="label">问题分类数</div></div>
  <div class="stat-card"><div class="num red">🔥 17</div><div class="label">竖向翻转失效（高频）</div></div>
</div>
<div class="filter-bar">
  <span>筛选模块：</span>
  <button class="btn active" onclick="filterModule('all',this)">全部</button>
  <button class="btn" onclick="filterModule('near',this)">⚔️ 近战</button>
  <button class="btn" onclick="filterModule('3c',this)">🎮 3C控制</button>
  <span style="margin-left:10px">筛选类型：</span>
  <button class="btn active2" onclick="filterType('all',this)">全部</button>
  <button class="btn" onclick="filterType('bug',this)">🐛 Bug</button>
  <button class="btn" onclick="filterType('suggest',this)">💡 建议</button>
  <button class="btn" onclick="filterType('exp',this)">⚡ 体验</button>
  <!-- ④ 导出按钮 -->
  <button class="btn btn-export" onclick="exportExcel()">📥 导出表格</button>
</div>
<div class="main" id="main-content"></div>
<script>
// ─── 数据定义 ────────────────────────────────────────────
const categories = [
// ═══════════════════════ 近战模块 ═══════════════════════
{
  id:'near-1', module:'near', title:'攻击命中缺陷', icon:'⚔️',
  mainType:'bug', priority:true,
  solution:['检查近战攻击碰撞体半径与攻击动作帧同步是否一致','修复近战攻击命中判定逻辑，确保挥击动作触发碰撞检测','新增攻击命中音效/特效反馈，增强打击感','增加近战命中容错范围，避免明显挥空'],
  items:[
    {id:1, zh:'近战攻击怪物时并非每次都能命中，反而会让怪物白嫖伤害', en:'Melee attacks dont always hit when attacking enemies thus giving the enemy free damage', type:'Bug', conf:'高'},
    {id:913, zh:'游戏开始时尝试击中AI敌人，挥动球棒但没有造成伤害', en:'trying to hit ai enemy start of game. Swinging bat but not damage', type:'Bug', conf:'高'},
  ]
},
{
  id:'near-2', module:'near', title:'输入延迟与流畅性', icon:'⚡',
  mainType:'exp', priority:true,
  solution:['优化近战处决的输入缓冲窗口，减少操作提示与实际响应的延迟','提升连招处决流畅度，修复冲锋攻击时多个处决提示堆叠的问题','针对快速输入增加更大的输入容错时间窗口'],
  items:[
    {id:15, zh:'近战处决存在轻微输入延迟，冲锋时操作提示与输入不同步，连续攻击敌人时会出现多个处决提示但输入延迟', en:'Their is a slight input delay on mele exections, promt is not fluid with input', type:'体验', conf:'高'},
  ]
},
{
  id:'near-3', module:'near', title:'近战按键绑定优化', icon:'🎮',
  mainType:'suggest',
  solution:['将快速近战攻击键从R3调整至R1，减少误操作概率','提供快速近战攻击多方案选项（连按/长按均可触发）','增加控制器按键自定义功能，允许玩家自行重映射近战键位'],
  items:[
    {id:18, zh:'刀具按钮应提供快速攻击（连按右操作杆）选项，或允许长按操作杆1-2秒后使用右扳机键发动攻击', en:'the knife button should have an option to do the quick attack or give the option to HOLD the thumbstick', type:'建议', conf:'高'},
    {id:28, zh:'建议调整快速近战攻击键：当前绑定在R3（摇杆键）不如改到R1更合理，毕竟R1仅在驾驶载具时有功能', en:'please change the fast melee attack button. It is bound to the R3 (joystick)', type:'建议', conf:'高'},
  ]
},
{
  id:'near-4', module:'near', title:'近战选项与武器获取', icon:'🗡️',
  mainType:'suggest',
  solution:['规划更多近战武器种类，包括刀、棍、钝器等多类型','增加近战连招与特殊处决动作','优化教程结束后近战武器的自然获取路径，降低获取门槛','在开放世界中增加近战武器的刷新点位'],
  items:[
    {id:70, zh:'游戏很棒，就是希望能有更多近战选项', en:'The game is great, just wish there was more melee options', type:'建议', conf:'高'},
    {id:92, zh:'教程结束后应更自然便捷地获取近战武器——我在教程里可没少用棒球棍', en:'Melee weapons need to be able to be obtained easier and more naturally after the tutorial', type:'体验', conf:'高'},
  ]
},
// ═══════════════════════ 3C模块 ═══════════════════════
{
  id:'3c-1', module:'3c', title:'🔥 竖向翻转设置失效（最高频Bug）', icon:'🔄',
  mainType:'bug', priority:true,
  solution:['【P0级修复】修复Y轴反转设置在战斗/瞄准时自动重置为默认的严重Bug','排查OTS肩射瞄准、辅助瞄准、技能使用、FP视角切换等所有导致设置重置的触发点','统一竖向反转设置的持久化存储逻辑，确保跨场景保持','修复退出构建模式/偏差技能使用后反转失效的边界情况','增加设置页面"反转锁定"选项，防止系统自动覆盖'],
  items:[
    {id:214, zh:'使用控制器战斗时，垂直视角反向输入会随机变化。这对许多玩家来说是破坏游戏体验的严重漏洞', en:'Inverted vertical look input will change randomly in combat using a controller', type:'Bug', conf:'高'},
    {id:356, zh:'按钮操作导致垂直反转关闭（按R3以外按钮即失效）', en:'Every time a button (besides R3) is pressed, vertical invert is turned off', type:'Bug', conf:'高'},
    {id:366, zh:'垂直反转瞄准失效，营地放置方向失灵', en:'Invert vertical does not work when enemy in sights', type:'Bug', conf:'高'},
    {id:403, zh:'战斗时镜头反转失效', en:'Camera inversion stops in combat', type:'Bug', conf:'高'},
    {id:414, zh:'Y轴反转设置异常，靠近敌人时自动恢复默认（PS5 Pro）', en:'Inverted Y axis is not working properly. Every time you get close to an enemy it switches back to default', type:'Bug', conf:'高'},

let isEditor = false;
let fbData = {};    // Firebase 数据本地缓存，实时同步

function unlockEdit() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if(pwd === EDIT_PASSWORD) {
    isEditor = true;
    document.getElementById('lock-bar').classList.add('unlocked');
    document.getElementById('lock-status').textContent = '🔓 编辑模式 · 数据实时同步到云端';
    document.getElementById('lock-btn').style.display = 'none';

    document.getElementById('lock-err').textContent = '';
    // 启用所有输入框
    document.querySelectorAll('td input').forEach(el => el.disabled = false);
  } else {
    const errEl = document.getElementById('lock-err');
    errEl.textContent = '❌ 密码错误，请重试';
    document.getElementById('pwd-input').value = '';
    setTimeout(() => errEl.textContent = '', 2500);
  }
}

// ─── Firebase 数据层（替代 localStorage）────────────────
function lsKey(catId, solIdx, field) { return `sol_${catId}_${solIdx}_${field}`; }
function lsGet(k, def='') {
  const v = fbData[k];
  return (v !== undefined && v !== null) ? v : def;
}
function lsSave(k, v) {
  if(!isEditor) return;   // 只读模式禁止写入
  fbData[k] = v;          // 本地立即缓存
  trackingRef.child(k).set(v === '' ? null : v);
}

// ─── 数据自动备份（防止功能迭代时误删数据）────────────────
// 每次页面加载时，把 /tracking 的数据快照备份到 /backup/{日期}
const backupRef = db.ref('/backup');
let hasBackedUp = false;  // 每次页面加载只备份一次

// ─── 实时监听 Firebase 数据变化 ──────────────────────────
trackingRef.on('value', snapshot => {
  fbData = snapshot.val() || {};

  // 首次拿到数据时，自动备份（只有有数据才备份）
  if(!hasBackedUp && Object.keys(fbData).length > 0) {
    hasBackedUp = true;
    const today = new Date().toISOString().slice(0, 10);  // 如 2026-04-01
    backupRef.child(today).once('value', bSnap => {
      // 当天已有备份则跳过，避免覆盖当天早期备份
      if(!bSnap.exists()) {
        backupRef.child(today).set(fbData);
        console.log(`[Backup] 数据已备份至 /backup/${today}`);
      }
    });
  }

  render();
});

// ─── 进度计算 ────────────────────────────────────────────
function getCatProgress(cat) {
  let done = 0, total = cat.solution.length;
  cat.solution.forEach((_, i) => {
    if(lsGet(lsKey(cat.id, i, 'done'), '0') === '1') done++;
  });
  return {done, total, pct: total ? Math.round(done/total*100) : 0};
}
function updateGlobalProgress() {
  let totalDone = 0, totalAll = 0;
  categories.forEach(cat => {
    const p = getCatProgress(cat);
    totalDone += p.done; totalAll += p.total;
  });
  const pct = totalAll ? Math.round(totalDone/totalAll*100) : 0;
  const bar = document.getElementById('gp-bar');
  const pctEl = document.getElementById('gp-pct');
  const detEl = document.getElementById('gp-detail');
  if(bar) { bar.style.width = pct+'%'; }
  if(pctEl) { pctEl.textContent = pct+'%'; pctEl.style.color = pct===100?'#f1e05a':pct>50?'#3fb950':'#58a6ff'; }
  if(detEl) { detEl.textContent = `${totalDone} / ${totalAll} 项优化完成`; }
  // 同步更新多维度进度
  updateTypeProgress();
}

// ─── 多维度进度（按模块 & 按类型）────────────────────────
function updateTypeProgress() {
  // 统计维度定义 [维度key, 匹配字段, 匹配值, dom前缀]
  const dims = [
    { key:'near',    field:'module',   val:'near',    pfx:'near'    },
    { key:'3c',      field:'module',   val:'3c',      pfx:'3c'      },
    { key:'bug',     field:'mainType', val:'bug',     pfx:'bug'     },
    { key:'suggest', field:'mainType', val:'suggest', pfx:'suggest' },
    { key:'exp',     field:'mainType', val:'exp',     pfx:'exp'     },
  ];
  dims.forEach(dim => {
    let done = 0, total = 0;
    categories.forEach(cat => {
      if(cat[dim.field] !== dim.val) return;
      const p = getCatProgress(cat);
      done += p.done; total += p.total;
    });
    const pct = total ? Math.round(done/total*100) : 0;
    const pctColor = pct===100?'#f1e05a':pct>50?'#3fb950':undefined; // undefined = 用CSS默认色

    const barEl = document.getElementById(`tp-bar-${dim.pfx}`);
    const pctEl = document.getElementById(`tp-pct-${dim.pfx}`);
    const detEl = document.getElementById(`tp-det-${dim.pfx}`);
    if(barEl) barEl.style.width = pct+'%';
    if(pctEl) {
      pctEl.textContent = pct+'%';
      if(pctColor) pctEl.style.color = pctColor;
    }
    if(detEl) detEl.textContent = `${done} / ${total} 项`;
  });
}
function updateCatProgress(catId) {
  const cat = categories.find(c=>c.id===catId); if(!cat) return;
  const p = getCatProgress(cat);
  const bar = document.getElementById(`cp-bar-${catId}`);
  const pct = document.getElementById(`cp-pct-${catId}`);
  if(bar) bar.style.width = p.pct+'%';
  if(pct) { pct.textContent = p.pct+'%'; pct.style.color = p.pct===100?'#f1e05a':p.pct>50?'#3fb950':'#58a6ff'; }
  updateGlobalProgress();
}

// ─── 辅助 ───────────────────────────────────────────────
function confClass(c) {
  return c==='高'?'conf-high':c.includes('中')?'conf-mid':'conf-low';
}
function typeTag(t) {
  if(t==='Bug') return '<span class="tag-bug">🐛 Bug</span>';
  if(t==='建议') return '<span class="tag-suggest">💡 建议</span>';
  return '<span class="tag-exp">⚡ 体验</span>';
}
function moduleClass(m) { return m==='near'?'module-near':'module-3c'; }
function moduleTag(m) { return m==='near'?'⚔️ 近战':'🎮 3C控制'; }

// ─── 渲染 ────────────────────────────────────────────────
let curModule='all', curType='all';

function render(fm, ft) {
  if(fm!==undefined) curModule=fm;
  if(ft!==undefined) curType=ft;

  // 记录当前已展开的 cat 和 items
  const openCats  = new Set([...document.querySelectorAll('.cat-body.open')].map(el=>el.id.replace('body-','')));
  const openItems = new Set([...document.querySelectorAll('.items-list.open')].map(el=>el.id.replace('items-','')));

  const container = document.getElementById('main-content');
  let html = '';
  categories.forEach(cat => {
    if(curModule!=='all' && cat.module!==curModule) return;
    if(curType!=='all' && cat.mainType!==curType) return;
    const mc = moduleClass(cat.module);
    const priBadge = cat.priority ? '<span class="priority-badge">⚠ 高优先级</span>' : '';
    const p = getCatProgress(cat);
    const pctColor = p.pct===100?'#f1e05a':p.pct>50?'#3fb950':'#58a6ff';

    // ── ① 优化点表格行 ──
    const solRows = cat.solution.map((sol, i) => {
      const k = (f) => lsKey(cat.id, i, f);
      const isDone = lsGet(k('done'),'0')==='1';
      const doneClass = isDone ? 'done-row' : '';
      const dis = isEditor ? '' : 'disabled';
      return `<tr class="${doneClass}" id="row-${cat.id}-${i}">
        <td style="width:24px;text-align:center"><span style="color:#8b949e;font-size:11px">${i+1}</span></td>
        <td class="sol-text">${sol}</td>
        <td style="min-width:80px"><input type="text" ${dis} placeholder="策划姓名" value="${lsGet(k('planner'))}" onchange="saveField('${cat.id}',${i},'planner',this.value)"></td>
        <td style="min-width:80px"><input type="text" ${dis} placeholder="程序姓名" value="${lsGet(k('dev'))}" onchange="saveField('${cat.id}',${i},'dev',this.value)"></td>
        <td style="min-width:80px"><input type="text" ${dis} placeholder="QA姓名" value="${lsGet(k('qa'))}" onchange="saveField('${cat.id}',${i},'qa',this.value)"></td>
        <td style="min-width:120px"><input type="text" ${dis} placeholder="策划备注..." value="${lsGet(k('note'))}" onchange="saveField('${cat.id}',${i},'note',this.value)"></td>
        <td style="min-width:90px"><input type="text" ${dis} placeholder="如 #1234" value="${lsGet(k('issue'))}" onchange="saveField('${cat.id}',${i},'issue',this.value)"></td>
        <td style="min-width:110px"><input type="date" ${dis} value="${lsGet(k('date'))}" onchange="saveField('${cat.id}',${i},'date',this.value)"></td>
        <td style="text-align:center;width:60px">
          <input type="checkbox" ${dis} ${isDone?'checked':''} onchange="toggleDone('${cat.id}',${i},this.checked)" title="是否完成">
        </td>
      </tr>`;
    }).join('');

    // ── ② 反馈条目 ──
    const itemsHtml = cat.items.map(item=>`
      <div class="item">
        <div class="item-top">
          <span class="item-id">#${item.id}</span>
          ${typeTag(item.type)}
          <span class="${confClass(item.conf)}">${item.conf}置信度</span>
        </div>
        <div class="item-zh">${item.zh}</div>
        <div class="item-en">${item.en}</div>
      </div>`).join('');

    html += `
    <div class="category-block ${mc}">
      <div class="cat-header" onclick="toggleCat('${cat.id}')">
        <span>${cat.icon}</span>
        <span class="cat-title">${cat.title}</span>
        ${priBadge}
        <span class="cat-count">${cat.items.length} 条反馈</span>
        <span class="module-tag">${moduleTag(cat.module)}</span>
        <span class="arrow" id="arr-${cat.id}">▶</span>
      </div>
      <!-- ② 聚合完成度进度条 -->
      <div class="cat-progress">
        <div class="cp-row">
          <span class="cp-label">完成进度</span>
          <div class="cp-bar-wrap"><div class="cp-bar" id="cp-bar-${cat.id}" style="width:${p.pct}%"></div></div>
          <span class="cp-pct" id="cp-pct-${cat.id}" style="color:${pctColor}">${p.pct}%</span>
          <span style="font-size:11px;color:#8b949e">${p.done}/${p.total}项</span>
        </div>
      </div>
      <div class="cat-body" id="body-${cat.id}">
        <!-- ① 优化点可编辑表格 -->
        <div class="solution-section">
          <div class="sol-title">📋 优化方案跟进表</div>
          <table class="sol-table">
            <thead><tr>
              <th>#</th>
              <th>优化点描述</th>
              <th>负责策划</th>
              <th>负责程序</th>
              <th>负责QA</th>
              <th>策划备注</th>
              <th>易协作单号</th>
              <th>完成时间</th>
              <th>✅ 完成</th>
            </tr></thead>
            <tbody>${solRows}</tbody>
          </table>
        </div>
        <!-- 反馈原文折叠展开 -->
        <div class="items-section">
          <span class="items-toggle" onclick="toggleItems('items-${cat.id}',this)">▶ 展开玩家原始反馈（${cat.items.length}条）</span>
          <div id="items-${cat.id}" class="items-list">${itemsHtml}</div>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html || '<div style="text-align:center;padding:60px;color:#8b949e">无符合条件数据</div>';

  // 恢复展开状态
  openCats.forEach(id => {
    const body = document.getElementById(`body-${id}`);
    const arr  = document.getElementById(`arr-${id}`);
    if(body) body.classList.add('open');
    if(arr)  arr.classList.add('open');
  });
  openItems.forEach(id => {
    const el  = document.getElementById(`items-${id}`);
    const btn = el && el.previousElementSibling;
    if(el) el.classList.add('open');
    if(btn && btn.classList.contains('items-toggle')) {
      btn.textContent = btn.textContent.replace('▶ 展开','▼ 收起');
    }
  });

  updateGlobalProgress();
}

// ─── 交互事件 ────────────────────────────────────────────
function toggleCat(catId) {
  const body = document.getElementById(`body-${catId}`);
  const arr = document.getElementById(`arr-${catId}`);
  body.classList.toggle('open');
  arr.classList.toggle('open');
}
function toggleItems(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open')
    ? btn.textContent.replace('▶ 展开','▼ 收起')
    : btn.textContent.replace('▼ 收起','▶ 展开');
}
function saveField(catId, solIdx, field, val) {
  lsSave(lsKey(catId, solIdx, field), val);
}
function toggleDone(catId, solIdx, checked) {
  lsSave(lsKey(catId, solIdx, 'done'), checked?'1':'0');
  const row = document.getElementById(`row-${catId}-${solIdx}`);
  if(row) { row.classList.toggle('done-row', checked); }
  updateCatProgress(catId);
}

function filterModule(m, el) {
  curModule = m;
  document.querySelectorAll('.filter-bar .btn:not(.btn-export)').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function filterType(t, el) {
  curType = t;
  el.classList.add('active');
  render();
}

// ─── ④ 导出 Excel ────────────────────────────────────────
function exportExcel() {
  const rows = [['问题分类','模块','优化点描述','负责策划','负责程序','负责QA','策划备注','易协作单号','完成时间','是否完成']];
  categories.forEach(cat => {
    cat.solution.forEach((sol, i) => {
      const k = (f) => lsKey(cat.id, i, f);
      rows.push([
        cat.title,
        cat.module==='near'?'近战':'3C控制',
        sol,
        lsGet(k('planner')),
        lsGet(k('dev')),
        lsGet(k('qa')),
        lsGet(k('note')),
        lsGet(k('issue')),
        lsGet(k('date')),
        lsGet(k('done'),'0')==='1'?'✅ 已完成':'⬜ 未完成'
      ]);
    });
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  // 设置列宽
  ws['!cols'] = [
    {wch:24},{wch:10},{wch:40},{wch:10},{wch:10},{wch:10},{wch:20},{wch:12},{wch:12},{wch:10}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '优化跟进表');
  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `近战与控制优化跟进_${today}.xlsx`);
}

// ─── 初始化说明 ──────────────────────────────────────────

</script>
